apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: volgapipelines.volga.io
spec:
  group: volga.io
  names:
    kind: VolgaPipeline
    listKind: VolgaPipelineList
    plural: volgapipelines
    singular: volgapipeline
    shortNames:
      - vpipe
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                pipelineSpec:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                workers:
                  type: object
                  properties:
                    replicas:
                      type: integer
                      format: int32
                image:
                  type: string
                imagePullPolicy:
                  type: string
                master:
                  type: object
                  properties:
                    imagePullPolicy:
                      type: string
                    resources:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                worker:
                  type: object
                  properties:
                    imagePullPolicy:
                      type: string
                    resources:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                holdOnFinish:
                  type: boolean
              required:
                - pipelineSpec
            status:
              type: object
              properties:
                pipelineId:
                  type: string
                phase:
                  type: string
                masterServiceAddr:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
