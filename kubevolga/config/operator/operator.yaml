apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubevolga-operator
  labels:
    app.kubernetes.io/name: kubevolga
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubevolga
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubevolga
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: kubevolga-operator
      containers:
        - name: operator
          image: kubevolga:dev
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          args:
            - --leader-elect=false
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
