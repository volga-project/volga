apiVersion: apps/v1
kind: Deployment
metadata:
  name: volga-test-storage
  namespace: default
  labels:
    app.kubernetes.io/name: volga-test-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: volga-test-storage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: volga-test-storage
    spec:
      containers:
        - name: storage
          image: volga:latest
          imagePullPolicy: IfNotPresent
          command: ["volga-test-storage"]
          env:
            - name: VOLGA_TEST_STORAGE_BIND_ADDR
              value: "0.0.0.0:50071"
          ports:
            - name: grpc
              containerPort: 50071
---
apiVersion: v1
kind: Service
metadata:
  name: volga-test-storage
  namespace: default
spec:
  selector:
    app.kubernetes.io/name: volga-test-storage
  ports:
    - name: grpc
      port: 50071
      targetPort: grpc
