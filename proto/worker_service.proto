syntax = "proto3";

package worker_service;

// WorkerService provides RPC methods for managing worker lifecycle and state
service WorkerService {
  rpc ConfigureWorker(ConfigureWorkerRequest) returns (ConfigureWorkerResponse);
  // Get the current state of the worker including task statuses and metrics
  rpc GetWorkerState(GetWorkerStateRequest) returns (GetWorkerStateResponse);
  
  // Start the worker and initialize all components
  rpc StartWorker(StartWorkerRequest) returns (StartWorkerResponse);
  
  // Start all tasks in the worker
  rpc RunWorkerTasks(RunWorkerTasksRequest) returns (RunWorkerTasksResponse);
  
  // Close all tasks in the worker
  rpc CloseWorkerTasks(CloseWorkerTasksRequest) returns (CloseWorkerTasksResponse);
  
  // Reset the current attempt while keeping the worker available for reconfiguration.
  rpc ResetWorker(ResetWorkerRequest) returns (ResetWorkerResponse);

  // Shut down the worker after final pipeline teardown.
  rpc ShutdownWorker(ShutdownWorkerRequest) returns (ShutdownWorkerResponse);

  // Inject a checkpoint barrier at source tasks (data-plane).
  rpc TriggerCheckpointBarrier(TriggerCheckpointBarrierRequest) returns (TriggerCheckpointBarrierResponse);

  // Bidirectional health/heartbeat stream between master and worker.
  rpc StreamHeartbeat(stream MasterHeartbeatMessage) returns (stream WorkerHeartbeatMessage);
}

message ConfigureWorkerRequest {
  bytes init_payload_bytes = 1;
  uint64 execution_attempt_id = 2;
}

message ConfigureWorkerResponse {
  bool success = 1;
  string error_message = 2;
  string execution_graph_signature = 3;
}

// Request message for GetWorkerState
message GetWorkerStateRequest {
  uint64 execution_attempt_id = 1;
}

// Response message for GetWorkerState
message GetWorkerStateResponse {
  bytes worker_state_bytes = 1;
}

// Request message for StartWorker
message StartWorkerRequest {
  uint64 execution_attempt_id = 1;
}

// Response message for StartWorker
message StartWorkerResponse {
  bool success = 1;
  string error_message = 2;
}

// Request message for RunWorkerTasks
message RunWorkerTasksRequest {
  uint64 execution_attempt_id = 1;
}

// Response message for RunWorkerTasks
message RunWorkerTasksResponse {
  bool success = 1;
  string error_message = 2;
}

// Request message for CloseWorkerTasks
message CloseWorkerTasksRequest {
  uint64 execution_attempt_id = 1;
}

// Response message for CloseWorkerTasks
message CloseWorkerTasksResponse {
  bool success = 1;
  string error_message = 2;
}

message ResetWorkerRequest {
  uint64 execution_attempt_id = 1;
}

message ResetWorkerResponse {
  bool success = 1;
  string error_message = 2;
}

message ShutdownWorkerRequest {
  uint64 execution_attempt_id = 1;
}

message ShutdownWorkerResponse {
  bool success = 1;
  string error_message = 2;
}

message TriggerCheckpointBarrierRequest {
  uint64 checkpoint_id = 1;
  uint64 execution_attempt_id = 2;
}

message TriggerCheckpointBarrierResponse {
  bool success = 1;
  string error_message = 2;
}

enum WorkerFatalReason {
  WORKER_FATAL_REASON_UNSPECIFIED = 0;
  WORKER_FATAL_REASON_PANIC = 1;
  WORKER_FATAL_REASON_TRANSPORT_DISCONNECT = 2;
  WORKER_FATAL_REASON_TASK_FAILURE = 3;
}

message MasterHeartbeatMessage {
  uint64 sent_at_ms = 1;
  uint64 execution_attempt_id = 2;
}

message WorkerHeartbeatMessage {
  string worker_id = 1;
  string pipeline_id = 2;
  uint64 sent_at_ms = 3;
  bool healthy = 4;
  WorkerFatalReason fatal_reason = 5;
  string fatal_message = 6;
  uint64 execution_attempt_id = 7;
  // False until configure binds this process to an attempt (fences unbound peers).
  bool configured = 8;
}