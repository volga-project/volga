syntax = "proto3";

package master_service;

service MasterService {
  rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse);
  rpc ReportCheckpoint(ReportCheckpointRequest) returns (ReportCheckpointResponse);
  // Barrier-propagation progress (diagnosis / timeouts). Never used for checkpoint completion.
  rpc ReportCheckpointPropagation(ReportCheckpointPropagationRequest) returns (ReportCheckpointPropagationResponse);
  rpc GetTaskCheckpoint(GetTaskCheckpointRequest) returns (GetTaskCheckpointResponse);
  rpc GetLatestCompleteCheckpoint(GetLatestCompleteCheckpointRequest) returns (GetLatestCompleteCheckpointResponse);
  rpc GetLatestPipelineSnapshot(GetLatestPipelineSnapshotRequest) returns (GetLatestPipelineSnapshotResponse);
  rpc GetLifecycleEvents(GetLifecycleEventsRequest) returns (GetLifecycleEventsResponse);
  // Ask running workers to stop sources (harness-driven pipeline finish).
  rpc StopSources(StopSourcesRequest) returns (StopSourcesResponse);
}

message RegisterWorkerRequest {
  string worker_id = 1;
}

message RegisterWorkerResponse {
  bool success = 1;
  string error_message = 2;
}

message StateBlob {
  string name = 1;
  bytes bytes = 2;
}

message ReportCheckpointRequest {
  uint64 checkpoint_id = 1;
  string vertex_id = 2;
  int32 task_index = 3;
  repeated StateBlob blobs = 4;
  uint64 execution_attempt_id = 5;
}

message ReportCheckpointResponse {
  bool success = 1;
  string error_message = 2;
}

enum CheckpointPropagationPhase {
  CHECKPOINT_PROPAGATION_PHASE_UNSPECIFIED = 0;
  CHECKPOINT_PROPAGATION_PHASE_BARRIER_INJECTED = 1;
  CHECKPOINT_PROPAGATION_PHASE_ALIGNED = 2;
}

message ReportCheckpointPropagationRequest {
  uint64 checkpoint_id = 1;
  string vertex_id = 2;
  int32 task_index = 3;
  uint64 execution_attempt_id = 4;
  CheckpointPropagationPhase phase = 5;
}

message ReportCheckpointPropagationResponse {
  bool success = 1;
  string error_message = 2;
}

message GetTaskCheckpointRequest {
  uint64 checkpoint_id = 1;
  string vertex_id = 2;
  int32 task_index = 3;
}

message GetTaskCheckpointResponse {
  bool success = 1;
  string error_message = 2;
  repeated StateBlob blobs = 3;
}

message GetLatestCompleteCheckpointRequest {
}

message GetLatestCompleteCheckpointResponse {
  bool success = 1;
  string error_message = 2;
  bool has_checkpoint = 3;
  uint64 checkpoint_id = 4;
}

message GetLatestPipelineSnapshotRequest {
}

message GetLatestPipelineSnapshotResponse {
  bool has_snapshot = 1;
  bytes snapshot_bytes = 2;
  uint64 ts_ms = 3;
  uint64 seq = 4;
}

message GetLifecycleEventsRequest {
  uint64 after_sequence = 1;
}

message LifecycleEventRecord {
  uint64 sequence = 1;
  bytes event_bytes = 2;
}

message GetLifecycleEventsResponse {
  repeated LifecycleEventRecord events = 1;
}

message StopSourcesRequest {
}

message StopSourcesResponse {
  bool success = 1;
  string error_message = 2;
}

