execution_mode: Streaming
parallelism: 1
task_assignment_strategy: OperatorPerWorker
sources:
  - table_name: test_table
    schema_json: |
      {
        "fields": [
          {
            "name": "value",
            "nullable": false,
            "type": { "name": "utf8" },
            "children": []
          }
        ]
      }
    source:
      Datagen: |
        {
          "rate": 1.0,
          "limit": 10,
          "run_for_s": null,
          "batch_size": 5,
          "fields": {
            "value": { "Key": { "num_unique": 1 } }
          },
          "replayable": true
        }
sink:
  InMemoryStorageGrpc: |
    {
      "server_addr": "http://volga-test-storage.default.svc.cluster.local:50071"
    }
sql: "SELECT value FROM test_table"
